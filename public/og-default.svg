<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ドットパターン -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- カード -->
  <rect x="80" y="80" width="1040" height="470" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- ロゴアイコン -->
  <g transform="translate(140, 148)">
    <rect x="0"  y="38" width="14" height="34" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="20" y="26" width="14" height="46" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="40" y="14" width="14" height="58" rx="2" fill="#fff" opacity="0.9"/>
    <path d="M6 38 L26 24 L46 18 L80 4" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M68 4 L80 4 L80 16" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- サイト名 -->
  <text x="240" y="192" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="2">tsumiba｜FX口座比較</text>

  <!-- メインキャッチ -->
  <text x="140" y="310" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="62" font-weight="900" fill="#fff">借金とお金の不安を、</text>
  <text x="140" y="390" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="62" font-weight="900" fill="#FBBF24">知識で立て直す。</text>

  <!-- サブコピー -->
  <text x="140" y="450" font-family="'Noto Sans JP', sans-serif" font-size="26" fill="rgba(255,255,255,0.8)">NISA・副業・節税・FX　体験談ベースで初心者にわかりやすく</text>

  <!-- 実績バッジ -->
  <rect x="140" y="488" width="200" height="44" rx="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="240" y="515" font-family="sans-serif" font-size="18" font-weight="700" fill="#FBBF24" text-anchor="middle">借金200万 → 資産500万</text>

  <rect x="360" y="488" width="160" height="44" rx="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="440" y="515" font-family="sans-serif" font-size="18" font-weight="700" fill="#FBBF24" text-anchor="middle">35歳FIRE目標</text>

  <rect x="540" y="488" width="160" height="44" rx="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="620" y="515" font-family="sans-serif" font-size="18" font-weight="700" fill="#FBBF24" text-anchor="middle">副業月20万達成</text>

  <!-- URL -->
  <text x="1060" y="515" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="end">tsumiba.com</text>
</svg>
