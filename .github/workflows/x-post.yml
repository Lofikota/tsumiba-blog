name: X自動投稿（無効・Cloudflare Workersに移行済み）

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（投稿せずキューだけ確認）'
        required: false
        default: 'false'

# 同時実行を禁止（二重投稿防止）
concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存関係インストール
        run: pip install -r x-automation/requirements.txt

      - name: X投稿実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python x-automation/x_poster.py

      - name: キュー更新をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x-automation/data/tweet_queue.csv
          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
          git diff --staged --quiet || git commit -m "chore: X投稿キュー更新 ${TIMESTAMP} JST"
          # push失敗時はrebaseして再試行（競合push対策）
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push失敗 (試行${i}/3)、5秒後に再試行..."
            sleep 5
          done
