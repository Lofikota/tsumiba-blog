name: ASP承認チェック → キュー自動追加

# Claude が Gmail MCP でメールを確認し、
# data/asp-status.md を更新してコミット/push すると
# このワークフローが起動してキューを自動更新する。
# Gmail OAuth は不要。

on:
  push:
    branches: [main]
    paths:
      - 'data/asp-status.md'      # Claude が更新したときに自動実行
  schedule:
    - cron: '0 2 * * *'           # 毎日 11:00 JST に念押しチェック
  workflow_dispatch:               # 手動実行も可

concurrency:
  group: asp-check
  cancel-in-progress: false

jobs:
  check-and-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      # ── Step1: asp-status.md から新規承認を検出 ──────────
      - name: 新規承認チェック（asp-status.md 読み取り）
        id: asp-check
        run: node scripts/asp-status-to-queue.mjs

      # ── Step2: 承認があればキューに追加 ──────────────────
      - name: keyword-queue.json に追加
        id: add-queue
        if: steps.asp-check.outputs.asp_approved_count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASP_APPROVED_LIST: ${{ steps.asp-check.outputs.asp_approved_list }}
        run: node scripts/asp-approval-to-queue.mjs

      # ── Step3: 変更があればコミット＆プッシュ ────────────
      - name: 変更をコミット＆プッシュ
        id: commit
        if: steps.add-queue.outputs.queue_added_count != '0'
        run: |
          git config user.name "ren-bot[bot]"
          git config user.email "bot@ren-money.com"
          git add data/keyword-queue.json data/asp-status-processed.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(queue): ASP承認によりキューに自動追加"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Step4: LINE通知（承認あり・キュー追加あり）────────
      - name: LINE通知（ASP承認 + キュー追加）
        if: steps.commit.outputs.committed == 'true'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          APPROVED_LIST: ${{ steps.asp-check.outputs.asp_approved_list }}
          ADDED_COUNT: ${{ steps.add-queue.outputs.queue_added_count }}
          ADDED_SLUGS: ${{ steps.add-queue.outputs.queue_added_slugs }}
        run: |
          node scripts/notify-line.mjs \
            --type asp \
            --approved "$APPROVED_LIST" \
            --message "keyword-queue に ${ADDED_COUNT} 件を追加しました。追加: ${ADDED_SLUGS}"

      # ── Step5: LINE通知（承認あり・キュー追加なし）─────────
      - name: LINE通知（承認あり・既にキュー登録済み）
        if: |
          steps.asp-check.outputs.asp_approved_count != '0' &&
          steps.add-queue.outputs.queue_added_count == '0'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          APPROVED_LIST: ${{ steps.asp-check.outputs.asp_approved_list }}
        run: |
          node scripts/notify-line.mjs \
            --type asp \
            --approved "$APPROVED_LIST" \
            --message "(slug重複のためキュー追加なし)"

      # ── Step6: エラー通知 ────────────────────────────────
      - name: LINE通知（エラー）
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_ID: ${{ github.run_id }}
        run: |
          node scripts/notify-line.mjs \
            --type error \
            --message "ASP承認チェックが失敗しました。GitHub Actions run_id=${RUN_ID} を確認してください。"
