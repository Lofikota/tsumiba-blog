name: LINE UserID Diagnostic

# LINE_USER_ID の取得・疎通確認用（一時診断ワークフロー）
# mode=get-userid  : 友だちのuserId一覧とbot情報を出力（※未認証アカウントは403）
# mode=set-webhook : Webhook URLを一時捕獲Worker（endpoint入力値）に設定し、active状態を表示
# mode=clear-webhook: Webhook URLを空に戻す（後片付け）
# mode=test-push   : Secrets設定後の疎通確認（実際にLINEへテスト通知を送る）
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "get-userid | set-webhook | clear-webhook | test-push"
        required: false
        default: "get-userid"
      endpoint:
        description: "set-webhook時のWebhook URL"
        required: false
        default: ""

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bot info（トークンがどのチャネルのものか確認）
        run: |
          status=$(curl -s -o bot.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            https://api.line.me/v2/bot/info)
          echo "HTTP $status"
          cat bot.json
          echo

      - name: Followers（友だちのuserId一覧＝LINE_USER_IDに設定すべき値）
        if: ${{ github.event.inputs.mode == 'get-userid' }}
        run: |
          status=$(curl -s -o followers.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            "https://api.line.me/v2/bot/followers/ids?limit=1000")
          echo "HTTP $status"
          cat followers.json
          echo
          if [ "$status" != "200" ]; then
            echo "::warning::followers取得失敗。403の場合はアカウント種別制限の可能性→webhook方式にフォールバック"
          fi

      - name: Set webhook endpoint（一時捕獲Workerへ向ける）
        if: ${{ github.event.inputs.mode == 'set-webhook' }}
        env:
          ENDPOINT: ${{ github.event.inputs.endpoint }}
        run: |
          status=$(curl -s -o result.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"${ENDPOINT}\"}" \
            https://api.line.me/v2/bot/channel/webhook/endpoint)
          echo "PUT HTTP $status"; cat result.json; echo
          status=$(curl -s -o info.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            https://api.line.me/v2/bot/channel/webhook/endpoint)
          echo "GET HTTP $status"; cat info.json; echo

      - name: Get webhook endpoint（GETのみ・状態を変更しない）
        if: ${{ github.event.inputs.mode == 'get-webhook' }}
        run: |
          status=$(curl -s -o info.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            https://api.line.me/v2/bot/channel/webhook/endpoint)
          echo "GET HTTP $status"; cat info.json; echo

      - name: Clear webhook endpoint（後片付け）
        if: ${{ github.event.inputs.mode == 'clear-webhook' }}
        run: |
          status=$(curl -s -o result.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"endpoint":"https://example.com/unused"}' \
            https://api.line.me/v2/bot/channel/webhook/endpoint)
          echo "PUT HTTP $status"; cat result.json; echo

      - name: Test push（LINE_USER_ID設定後の疎通確認）
        if: ${{ github.event.inputs.mode == 'test-push' }}
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node scripts/notify-line.mjs --type info --message "LINE通知テスト成功。LINE_USER_ID修正が完了しました。"
