name: 毎日記事自動公開

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 10:00 JST
  workflow_dispatch:        # 手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ren-blog-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: キュー検証
        id: queue-check
        run: npm run queue:check

      - name: 記事生成（draft:true＝CMS下書き・人間レビュー後に公開）
        id: article
        if: steps.queue-check.outputs.has_pending == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: 内部リンク自動挿入
        if: steps.article.outputs.status == 'published'
        run: node scripts/internal-links.mjs

      - name: Astroビルド（公開確認）
        if: steps.article.outputs.status == 'published'
        run: npm run build

      - name: 記事をコミット＆プッシュ
        id: commit
        if: steps.article.outputs.status == 'published'
        env:
          ARTICLE_SLUG: ${{ steps.article.outputs.slug }}
        run: |
          git config user.name "ren-bot[bot]"
          git config user.email "bot@ren-money.com"
          git add src/content/blog/ data/keyword-queue.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(article): 記事公開 ${ARTICLE_SLUG}"
            # 実行中にCMS編集や別セッションのpushが入ると fast-forward 拒否で
            # 生成記事ごと消失する（2026-07-05に実発生）。rebaseしてからpushする
            git pull --rebase origin main
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: LINE通知（公開完了）
        if: steps.commit.outputs.committed == 'true'
        env:
          ARTICLE_SLUG: ${{ steps.article.outputs.slug }}
          CHAR_COUNT: ${{ steps.article.outputs.char_count }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node scripts/notify-line.mjs --type publish --slug "$ARTICLE_SLUG" --chars "$CHAR_COUNT"

      - name: LINE通知（記事生成失敗）
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_ID: ${{ github.run_id }}
        run: |
          node scripts/notify-line.mjs --type error --message "毎日記事自動公開が失敗しました。GitHub Actions run_id=${RUN_ID} を確認してください。"
