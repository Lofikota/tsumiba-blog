name: X投稿自動生成（週次）

on:
  schedule:
    # JST 日曜 08:00 = UTC 土曜 23:00
    - cron: '0 23 * * 6'
  workflow_dispatch:
    inputs:
      week_offset:
        description: '何週先を生成するか（0=翌週, 1=翌々週）'
        required: false
        default: '0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存関係インストール
        run: pip install -r x-automation/requirements.txt

      # 一時診断（2026-07-05）: トークン有効性とアカウントID整合を機械判定。値は一切出力しない
      - name: Cloudflare認証診断
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token長: ${#CLOUDFLARE_API_TOKEN} 文字 / accountId長: ${#CLOUDFLARE_ACCOUNT_ID} 文字"
          echo "--- /user/tokens/verify ---"
          curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d['success'], '/ status:', (d.get('result') or {}).get('status'), '/ errors:', d['errors'])"
          echo "--- D1一覧（アカウントID整合確認）---"
          curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d['success'], '/ errors:', d['errors'], '/ db数:', len(d.get('result') or []))"

      - name: ツイート生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          WEEK_OFFSET="${{ github.event.inputs.week_offset }}"
          python x-automation/generate_tweets.py "${WEEK_OFFSET:-0}"

      - name: D1スキーマ適用（冪等・テーブル欠落の自己修復）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 d1 execute x-tweet-queue --file=x-automation/d1_schema.sql --remote

      - name: D1に同期（Cloudflare Workers用）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -f x-automation/data/d1_sync.sql ]; then
            npx wrangler@4 d1 execute x-tweet-queue --file=x-automation/data/d1_sync.sql --remote
            echo "D1同期完了"
          else
            echo "D1同期SQLなし（新規生成なし）"
          fi

      - name: キュー更新をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x-automation/data/tweet_queue.csv
          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
          git diff --staged --quiet || git commit -m "chore: X投稿キュー週次生成 ${TIMESTAMP} JST"
          git push
